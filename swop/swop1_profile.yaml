groupname  : demo
taskrunner : defaulttaskbb.taskdb.sml.hpe
policyuri  : ~
resourcemgr :
    mgrtype    : DOCKER
    accessinfo :
        accesstype : FROMENV

network    : <SWARM-NETWORK>

apls :
    locator :
        host : <LICENSE-SERVER-ADDRESS>
        port : ~

apisrv :
    locator :
        host : ~
        port : ~
        service: ~

envvars :
    - SL_LOG_LEVEL : INFO
    - http_proxy : ~
    - https_proxy : ~
    - no_proxy : ~
    - HTTP_PROXY : ~
    - HTTPS_PROXY : ~
    - NO_PROXY : ~

nodes :

    - slnodedef :
        idx : 0

        identity :
            - attribute :
                aType : KEY
                mType : BIND
                src : "<PROJECT-CERTS>/sl-1-key.pem"
                tgt : "/swarm-cert/sl-key.pem"
                subPath : null

            - attribute :
                aType : CERT
                mType : BIND
                src : "<PROJECT-CERTS>/sl-1-cert.pem"
                tgt : "/swarm-cert/sl-cert.pem"
                subPath : null

            - attribute :
                aType : CAPATH
                mType : BIND
                src : "<PROJECT-CACERTS>"
                tgt : "/swarm-cert/capath"
                subPath : null

        slhostname : sl1
        slhostip   : sl1
        slport : ~

        usrhostname : user1

        privatedata :
            src: "<CURRENT-PATH>/examples/fraud-detection/data-and-scratch1"
            mType : BIND

        slenvvars : null

        usrenvvars :
            - SCRATCH_DIR : "user1"
            - RESULT_FILE : "results.json"

    - slnodedef :
        idx : 1

        identity :
            - attribute :
                aType : KEY
                mType : BIND
                src : "<PROJECT-CERTS>/sl-1-key.pem"
                tgt : "/swarm-cert/sl-key.pem"
                subPath : null

            - attribute :
                aType : CERT
                mType : BIND
                src : "<PROJECT-CERTS>/sl-1-cert.pem"
                tgt : "/swarm-cert/sl-cert.pem"
                subPath : null

            - attribute :
                aType : CAPATH
                mType : BIND
                src : "<PROJECT-CACERTS>"
                tgt : "/swarm-cert/capath"
                subPath : null

        slhostname : sl2
        slhostip   : sl2
        slport : ~

        usrhostname : user2

        privatedata :
            src: "<CURRENT-PATH>/examples/fraud-detection/data-and-scratch2"
            mType : BIND

        slenvvars : null

        usrenvvars :
            - SCRATCH_DIR : "user2"
            - RESULT_FILE : "results.json"